name: CI

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  godot-headless-check:
    name: godot-headless-check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: hijacksoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false

      - name: Validate Godot project (headless import)
        env:
          GODOT_DISABLE_LEAK_CHECKS: "1"
        run: |
          set -euo pipefail
          godot --headless --path . --import --quit
